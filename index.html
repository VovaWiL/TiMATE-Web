<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMATE — Загрузка</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #d4fc79 0%, #96e6a1 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        header {
            padding: 40px 0;
            opacity: 0;
            transform: translateY(-30px);
            animation: fadeInSimple 1s ease-out forwards;
        }

        .logo-text {
            font-size: clamp(3.5rem, 15vw, 6rem);
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(0,0,0,0.8);
            margin: 0;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 60px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            max-width: 1000px;
            opacity: 0;
            margin-top: 50px; 
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        box-shadow 0.5s ease, 
                        opacity 0.8s ease,
                        margin-top 0.8s ease;
            animation: finalRise 1s ease-out 0.2s forwards;
        }

        .glass-card:hover {
            transform: translateY(-20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        @media (max-width: 900px) {
            .download-grid { grid-template-columns: 1fr; }
        }

        .btn {
            display: flex; align-items: center; justify-content: center;
            gap: 15px;
            padding: 20px 25px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: bold; font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #000;
        }

        .btn-win { 
            background: linear-gradient(135deg, #0078d4, #00bcf2); 
            color: white; 
            box-shadow: 0 10px 20px rgba(0, 120, 212, 0.2);
        }
        
        .btn-and { background: #3DDC84; box-shadow: 0 10px 20px rgba(61, 220, 132, 0.2); }
        .btn-web { background: white; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05); }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        @keyframes finalRise {
            to { opacity: 1; margin-top: 20px; }
        }

        @keyframes fadeInSimple {
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 60px;
            opacity: 0.4;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">TIMATE</div>
        <p style="font-size: 1.2rem; opacity: 0.8; margin-top: 10px;">Мессенджер на все платформы</p>
    </header>

    <main>
        <div class="glass-card">
            <h2 style="margin-top: 0; font-size: 2.2rem;">Выберите платформу</h2>
            <p style="opacity: 0.7;">Скачайте клиент или откройте Web-версию</p>
            
            <div class="download-grid">
                <a href="https://drive.usercontent.google.com/download?id=1p5wjhEZ-bLrl8fZfeapMoZslVVCZw4Wb&export=download&authuser=0&confirm=t&uuid=75813de6-f812-4f32-9cd5-11a82cc6bc9b&at=ALBwUgk50vRWjbk8Tl_VfUnwqsgM:1776523106717" class="btn btn-win">
                    <i class="fab fa-windows fa-2x"></i>
                    <div style="text-align: left;">
                        <span style="font-size: 0.8rem; display: block;">Скачать для</span>
                        <span>Windows</span>
                    </div>
                </a>

                <a href="TIMATE.apk" download class="btn btn-and">
                    <i class="fab fa-android fa-2x"></i>
                    <div style="text-align: left;">
                        <span style="font-size: 0.8rem; display: block;">Скачать для</span>
                        <span>Android</span>
                    </div>
                </a>

                <a href="https://timate.ru/" target="_blank" class="btn btn-web">
                    <i class="fas fa-globe fa-2x"></i>
                    <div style="text-align: left;">
                        <span style="font-size: 0.8rem; display: block;">Открыть</span>
                        <span>Web-версию</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 TIMATE. Все права защищены.
    </footer>
</div>

</body>
</html>
